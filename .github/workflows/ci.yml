name: CI

on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to run CI on'
        required: false
        default: ''

env:
  TRUSTED_ASSOCIATIONS: '["OWNER", "MEMBER", "COLLABORATOR"]'

jobs:
  lint:
    runs-on: self-hosted
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved' && contains(fromJSON(env.TRUSTED_ASSOCIATIONS), github.event.review.author_association)) ||
      (github.event_name == 'pull_request_target' && contains(fromJSON(env.TRUSTED_ASSOCIATIONS), github.event.pull_request.author_association))
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.event.review.commit_id || '' }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Check formatting
        run: uv run ruff format --check src/

      - name: Lint
        run: uv run ruff check src/

  typecheck:
    runs-on: self-hosted
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved' && contains(fromJSON(env.TRUSTED_ASSOCIATIONS), github.event.review.author_association)) ||
      (github.event_name == 'pull_request_target' && contains(fromJSON(env.TRUSTED_ASSOCIATIONS), github.event.pull_request.author_association))
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.event.review.commit_id || '' }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Type check with mypy
        run: uv run mypy src/

  test:
    runs-on: self-hosted
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved' && contains(fromJSON(env.TRUSTED_ASSOCIATIONS), github.event.review.author_association)) ||
      (github.event_name == 'pull_request_target' && contains(fromJSON(env.TRUSTED_ASSOCIATIONS), github.event.pull_request.author_association))
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.event.review.commit_id || '' }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: uv run coverage run manage.py test --settings=src.llteacher.test_settings src

      - name: Coverage report
        run: uv run coverage report
